<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Profil resmi Rifaldi Hidayat - Developer & Content Creator">
  <meta property="og:title" content="Rifaldi Hidayat | My Account">
  <meta property="og:description" content="Hubungi saya melalui media sosial berikut">
  <meta property="og:type" content="website">
  <title>Profil Saya - Rifaldi Hidayat</title>
  
  <!-- Link ke CSS eksternal -->
  <link rel="stylesheet" href="style.css">
  
  <!-- Preconnect untuk performa Giscus -->
  <link rel="preconnect" href="https://giscus.app">
</head>

<body>
  <!-- Theme Toggle Button -->
  <div class="theme-toggle" id="themeToggle" role="button" tabindex="0" aria-label="Toggle dark/light mode">
    <span class="sun">☀️</span>
    <span class="moon">🌙</span>
  </div>

  <!-- Main Container -->
  <div class="profile-container">
    
    <!-- Title -->
    <h1 class="title">✨ My Account</h1>

    <!-- Profile Picture -->
    <div class="profile-pic">
      <img src="pp.png" alt="Foto Profil Rifaldi Hidayat" id="profileImage" onerror="this.src='https://ui-avatars.com/api/?name=Rifaldi+Hidayat&size=120&background=667eea&color=fff'">
    </div>

    <!-- Name with Typewriter Effect -->
    <h2 class="name">
      <span id="typewriter"></span><span class="cursor" aria-hidden="true">|</span>
    </h2>

    <!-- About Section -->
    <div class="about-section">
      <p class="bio">👋 Halo! Saya pengembang web yang suka membuat pengalaman digital yang menarik dan interaktif.</p>
      <div class="skills" id="skillsContainer">
        <!-- Skill tags akan di-generate oleh JavaScript -->
      </div>
    </div>

    <!-- Social Media Buttons -->
    <div class="buttons" id="socialButtons">
      <!-- Tombol akan di-generate oleh JavaScript -->
    </div>

    <!-- Comments Section with Giscus -->
    <div class="comments-section" id="commentsSection">
      <h3>💭 Komentar</h3>
      <div id="giscus-container"></div>
    </div>

  </div>

  <!-- Footer -->
  <footer class="footer">
    <p>© <span id="year"></span> Rifaldi Hidayat • Made with ❤️</p>
  </footer>

  <!-- Link ke JavaScript eksternal -->
  <script src="script.js" defer></script>
</body>
</html>
