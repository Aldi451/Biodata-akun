<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <meta name="description" content="Profil resmi Rifaldi Hidayat - Developer & Content Creator">
  <meta name="theme-color" content="#667eea">
  <meta property="og:title" content="Rifaldi Hidayat | My Account">
  <meta property="og:description" content="Hubungi saya melalui media sosial berikut">
  <meta property="og:type" content="website">
  <title>Profil Saya - Rifaldi Hidayat</title>
  
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://giscus.app">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👤</text></svg>">
</head>

<body>
  <!-- Theme Toggle -->
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark/light mode" title="Ganti Tema">
    <span class="sun">☀️</span>
    <span class="moon">🌙</span>
  </button>

  <!-- Main Container -->
  <main class="profile-container">
    
    <!-- Header -->
    <header class="profile-header">
      <h1 class="title">✨ My Account</h1>
    </header>

    <!-- Profile Picture -->
    <section class="profile-pic-section">
      <div class="profile-pic-wrapper">
        <img src="pp.png" alt="Foto Profil Rifaldi Hidayat" id="profileImage" 
             onerror="this.src='https://ui-avatars.com/api/?name=Rifaldi+Hidayat&size=200&background=667eea&color=fff&bold=true'">
        <div class="profile-pic-ring"></div>
      </div>
    </section>

    <!-- Name with Typewriter -->
    <section class="name-section">
      <h2 class="name">
        <span id="typewriter"></span><span class="cursor" aria-hidden="true">|</span>
      </h2>
    </section>

    <!-- About Section -->
    <section class="about-section">
      <div class="bio-card">
        <p class="bio">👋 Halo! Saya pengembang web yang suka membuat pengalaman digital yang menarik dan interaktif.</p>
        <div class="skills" id="skillsContainer" role="list" aria-label="Keahlian"></div>
      </div>
    </section>

    <!-- Social Media Buttons -->
    <section class="buttons-section">
      <div class="buttons" id="socialButtons" role="group" aria-label="Tombol media sosial"></div>
    </section>

    <!-- Comments Section -->
    <section class="comments-section" id="commentsSection" aria-live="polite">
      <h3 class="comments-title">💭 Komentar</h3>
      <div id="giscus-container"></div>
    </section>

  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>© <span id="year"></span> Rifaldi Hidayat • Made with <span class="heart">❤️</span></p>
  </footer>

  <!-- Toast Notification -->
  <div id="toast" class="toast" role="alert" aria-live="assertive"></div>

  <script src="script.js" defer></script>
</body>
</html>
